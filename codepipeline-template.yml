AWSTemplateFormatVersion: '2010-09-09'
Description: 'Multi-environment Terraform CI/CD Pipeline'

Parameters:
  GitHubRepo:
    Type: String
    Description: GitHub repository name
    Default: your-repo-name
  GitHubOwner:
    Type: String
    Description: GitHub repository owner
    Default: your-github-username
  GitHubToken:
    Type: String
    NoEcho: true
    Description: GitHub personal access token
  S3BucketName:
    Type: String
    Description: S3 bucket for artifacts
    Default: demo-eks-manoj-shopcase

Resources:
  # S3 Bucket for Pipeline Artifacts
  ArtifactStore:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${S3BucketName}-pipeline-artifacts"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # CodeBuild Service Role
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      Policies:
        - PolicyName: CodeBuildLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${ArtifactStore.Arn}/*"

  # CodePipeline Service Role
  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub "${ArtifactStore.Arn}"
                  - !Sub "${ArtifactStore.Arn}/*"
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: "*"

  # CodeBuild Projects
  DevCIProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: terraform-ci-dev
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENV
            Value: dev
            Type: PLAINTEXT
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-ci.yml

  DevCDProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: terraform-cd-dev
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENV
            Value: dev
            Type: PLAINTEXT
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-cd.yml

  QACIProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: terraform-ci-qa
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENV
            Value: qa
            Type: PLAINTEXT
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-ci.yml

  QACDProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: terraform-cd-qa
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENV
            Value: qa
            Type: PLAINTEXT
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-cd.yml

  ProdCIProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: terraform-ci-prod
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENV
            Value: prod
            Type: PLAINTEXT
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-ci.yml

  ProdCDProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: terraform-cd-prod
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENV
            Value: prod
            Type: PLAINTEXT
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-cd.yml

  # CodePipeline
  TerraformPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: terraform-multi-env-pipeline
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactStore
      Stages:
        # Source Stage
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: '1'
              Configuration:
                Owner: !Ref GitHubOwner
                Repo: !Ref GitHubRepo
                Branch: main
                OAuthToken: !Ref GitHubToken
              OutputArtifacts:
                - Name: SourceOutput

        # Dev Environment
        - Name: Dev-CI
          Actions:
            - Name: DevValidation
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref DevCIProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: DevCIOutput

        - Name: Dev-CD
          Actions:
            - Name: DevDeploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref DevCDProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: DevCDOutput

        # QA Environment
        - Name: QA-CI
          Actions:
            - Name: QAValidation
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref QACIProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: QACIOutput

        - Name: QA-Approval
          Actions:
            - Name: QAManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: '1'
              Configuration:
                CustomData: 'Please review the QA deployment plan and approve to proceed.'

        - Name: QA-CD
          Actions:
            - Name: QADeploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CDProject  # Same project as dev
                EnvironmentVariablesOverride: '[{"name":"ENV","value":"qa","type":"PLAINTEXT"}]'
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: QACDOutput

        # Prod Environment
        - Name: Prod-CI
          Actions:
            - Name: ProdValidation
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref ProdCIProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: ProdCIOutput

        - Name: Prod-Approval
          Actions:
            - Name: ProdManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: '1'
              Configuration:
                CustomData: 'Please review the PRODUCTION deployment plan and approve to proceed.'

        - Name: Prod-CD
          Actions:
            - Name: ProdDeploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CDProject  # Same project as dev
                EnvironmentVariablesOverride: '[{"name":"ENV","value":"prod","type":"PLAINTEXT"}]'
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: ProdCDOutput

Outputs:
  PipelineName:
    Description: Name of the created pipeline
    Value: !Ref TerraformPipeline
  
  PipelineUrl:
    Description: URL of the pipeline in AWS Console
    Value: !Sub "https://console.aws.amazon.com/codesuite/codepipeline/pipelines/${TerraformPipeline}/view"