version: 0.2

env:
  variables:
    TF_IN_AUTOMATION: "true"
    TF_VERSION: "1.12.2"
    ENV: "dev"
    ACTIONS: "apply"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
      - unzip -o terraform.zip -d /usr/local/bin
      - terraform version

  pre_build:
    commands:
      - echo "Environment - $ENV"
      - echo "Actions - $ACTIONS"
      - cd 01-Infra/environments/$ENV

  build:
    commands:
      - terraform init -input=false
      - terraform plan -input=false -out=tfplan
      - echo "Action to execute - $ACTIONS"
      - test "$ACTIONS" = "apply" && terraform apply -input=false -auto-approve tfplan
      - test "$ACTIONS" = "destroy" && terraform destroy -input=false -auto-approve

artifacts:
  files:
    - "**/*"
  name: terraform-cd-$ENV-$ACTIONS
