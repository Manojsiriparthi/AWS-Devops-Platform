version: 0.2

env:
  variables:
    ENV: "dev"
    TF_VERSION: "1.12.2"
    TF_IN_AUTOMATION: "true"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - 'echo "Installing Terraform ${TF_VERSION}"'
      - 'curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip'
      - 'unzip -o terraform.zip -d /usr/local/bin/'
      - 'rm -f terraform.zip'
      - 'terraform version'

  pre_build:
    commands:
      - 'terraform fmt -check -recursive $CODEBUILD_SRC_DIR/01-Infra/'
      - 'cd $CODEBUILD_SRC_DIR/01-Infra/environments/${ENV}'
      - 'terraform init -backend=false -input=false'
      - 'terraform validate'

  build:
    commands:
      - 'cd $CODEBUILD_SRC_DIR/01-Infra/environments/${ENV}'
      - 'terraform init -input=false'
      - 'terraform plan -out=tfplan -input=false'
      - 'terraform apply -auto-approve -input=false tfplan'
      - 'terraform output || true'

  post_build:
    commands:
      - 'echo "Pipeline Completed"'
      - 'echo "Environment=${ENV}"'
      - 'echo "Build=${CODEBUILD_BUILD_SUCCEEDING}"'

artifacts:
  files:
    - '01-Infra/environments/${ENV}/tfplan'
  discard-paths: yes

cache:
  paths:
    - '/root/.terraform.d/plugin-cache/**/*'
    - '01-Infra/environments/${ENV}/.terraform/**/*'
