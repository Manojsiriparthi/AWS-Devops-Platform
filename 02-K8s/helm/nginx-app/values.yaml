# Default values for nginx-app
# This is a YAML-formatted file.

# Application configuration
app:
  name: nginx-app
  version: "1.25"

# Image configuration
image:
  repository: nginx
  tag: "1.25-alpine"
  pullPolicy: IfNotPresent

# Deployment configuration
replicaCount: 2

# Resource limits and requests
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 80
  annotations: {}

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: nginx-app.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Environment-specific configuration
environment: dev

# Custom nginx configuration
nginx:
  # Custom index.html content
  customIndex: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Day 4 - Kubernetes + Helm Demo</title>
        <style>
            body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
            .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
            .header { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 20px; margin-bottom: 30px; }
            .info-box { background: #ecf0f1; padding: 15px; border-radius: 5px; margin: 15px 0; }
            .status { color: #27ae60; font-weight: bold; }
            .env { background: #e8f5e8; border-left: 4px solid #27ae60; }
            .tech { background: #e8f4fd; border-left: 4px solid #3498db; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🚀 Day 4: Kubernetes Application via Helm</h1>
                <p class="status">✅ Application Successfully Deployed!</p>
            </div>
            
            <div class="info-box env">
                <h3>📋 Environment Information</h3>
                <p><strong>Environment:</strong> <span id="environment">Loading...</span></p>
                <p><strong>Pod Name:</strong> <span id="hostname">Loading...</span></p>
                <p><strong>Pod IP:</strong> <span id="pod-ip">Loading...</span></p>
                <p><strong>Kubernetes Node:</strong> <span id="node-name">Loading...</span></p>
            </div>
            
            <div class="info-box tech">
                <h3>🔧 Technology Stack</h3>
                <ul>
                    <li><strong>Container:</strong> Nginx 1.25 Alpine</li>
                    <li><strong>Orchestration:</strong> Kubernetes (EKS)</li>
                    <li><strong>Deployment:</strong> Helm Chart</li>
                    <li><strong>Infrastructure:</strong> Terraform + AWS</li>
                </ul>
            </div>
            
            <div class="info-box">
                <h3>📊 Application Status</h3>
                <p>🟢 <strong>Status:</strong> Running</p>
                <p>🕒 <strong>Deployed:</strong> <span id="timestamp"></span></p>
                <p>🏗️ <strong>Managed by:</strong> Helm Chart</p>
            </div>
            
            <div class="info-box">
                <h3>🔗 Health Check Endpoints</h3>
                <ul>
                    <li><a href="/health">Health Check</a> - Application health status</li>
                    <li><a href="/ready">Readiness Check</a> - Pod readiness status</li>
                    <li><a href="/info">System Info</a> - Detailed system information</li>
                </ul>
            </div>
        </div>
        
        <script>
            // Populate dynamic information
            document.getElementById('timestamp').textContent = new Date().toLocaleString();
            
            // Fetch pod information from environment variables (will be injected by Kubernetes)
            fetch('/info')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('hostname').textContent = data.hostname || 'Unknown';
                    document.getElementById('pod-ip').textContent = data.pod_ip || 'Unknown';
                    document.getElementById('node-name').textContent = data.node_name || 'Unknown';
                    document.getElementById('environment').textContent = data.environment || 'dev';
                })
                .catch(error => {
                    console.log('Info endpoint not available, using fallback values');
                    document.getElementById('hostname').textContent = window.location.hostname;
                    document.getElementById('environment').textContent = 'dev';
                });
        </script>
    </body>
    </html>

# Pod security context
securityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101

# Container security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Health checks
healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Node selection
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Additional labels
labels: {}

# Additional annotations
annotations: {}