# Development environment overrides
environment: dev

# Resource configuration for dev (smaller)
replicaCount: 2

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Service configuration (ClusterIP for dev)
service:
  type: ClusterIP
  port: 80

# Ingress disabled for dev (use port-forward)
ingress:
  enabled: false

# Autoscaling disabled for dev
autoscaling:
  enabled: false

# Relaxed security for development
securityContext:
  runAsNonRoot: false
  runAsUser: 0
  fsGroup: 0

# Relaxed container security context for dev  
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: []  # Don't drop all capabilities in dev

# Development-specific labels
labels:
  env: dev
  tier: development
  cost-center: dev-team

# Development annotations
annotations:
  deployment.kubernetes.io/revision: "1"
  description: "Development environment nginx application"
