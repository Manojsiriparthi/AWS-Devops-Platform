# ==============================================================================
# Nginx Default Server Configuration for StreamFlix React App
# Optimized for SPA (Single Page Application) serving
# ==============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # Security headers specific to this server
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Enable Brotli compression if available
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml;
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        access_log off;
        
        # Enable CORS for fonts
        location ~* \.(woff|woff2|ttf|eot)$ {
            add_header Access-Control-Allow-Origin "*";
        }
    }
    
    # Cache HTML files for shorter time
    location ~* \.(html|htm)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"healthy","service":"streamflix","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }
    
    # Ready check endpoint for Kubernetes readiness probe
    location /ready {
        access_log off;
        return 200 '{"status":"ready","service":"streamflix","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }
    
    # API endpoint for system information (used by React app)
    location /api/info {
        access_log off;
        return 200 '{
            "hostname": "$hostname",
            "server_addr": "$server_addr",
            "remote_addr": "$remote_addr",
            "request_time": "$time_iso8601",
            "environment": "production",
            "version": "1.0.0"
        }';
        add_header Content-Type application/json;
    }
    
    # Metrics endpoint for monitoring (optional)
    location /metrics {
        access_log off;
        return 200 '# HELP nginx_requests_total Total number of nginx requests
# TYPE nginx_requests_total counter
nginx_requests_total $request_time
# HELP nginx_uptime_seconds Nginx uptime in seconds  
# TYPE nginx_uptime_seconds gauge
nginx_uptime_seconds $msec
';
        add_header Content-Type text/plain;
    }
    
    # React Router support - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        
        # Add headers for development
        add_header X-Served-By "StreamFlix-Nginx" always;
        add_header X-Environment "Kubernetes" always;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}